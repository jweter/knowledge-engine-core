name: M12 Real 100-Paper Rehearsal

on:
  pull_request:
    paths:
      - .github/workflows/m12-rehearsal.yml
      - .github/scripts/prepare_m12_pmc_corpus.py

permissions:
  contents: read

jobs:
  rehearsal:
    name: Ephemeral PMC OA rehearsal
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      KE_DATA_DIR: ${{ github.workspace }}/.m12-runtime/data
      CORPUS_JSON: ${{ github.workspace }}/.m12-runtime/corpus/corpus.json

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry and dependencies
        run: |
          python -m pip install poetry
          poetry install

      - name: Record environment
        run: |
          mkdir -p .m12-runtime/evidence
          {
            echo "Git commit: $GITHUB_SHA"
            echo "Operating system: $(uname -srm)"
            echo "Python: $(python --version 2>&1)"
            echo "Poetry: $(poetry --version)"
            echo "CPU logical cores: $(nproc)"
            echo "Memory: $(free -h | awk '/Mem:/ {print $2}')"
            echo "PyMuPDF: $(poetry run python -c 'import fitz; print(fitz.VersionBind)')"
            echo "SQLAlchemy: $(poetry run python -c 'import sqlalchemy; print(sqlalchemy.__version__)')"
            echo "SQLite: $(poetry run python -c 'import sqlite3; print(sqlite3.sqlite_version)')"
          } > .m12-runtime/evidence/environment.txt

      - name: Prepare exactly 100 licensed PMC OA PDFs
        run: |
          poetry run python .github/scripts/prepare_m12_pmc_corpus.py \
            --workspace "$GITHUB_WORKSPACE" \
            --count 100 | tee .m12-runtime/preparation.log
          test "$(find .m12-runtime/papers -maxdepth 1 -type f -name '*.pdf' | wc -l)" -eq 100

      - name: Validate corpus preflight
        run: |
          poetry run ke corpus-validate "$CORPUS_JSON" --check-files \
            | tee .m12-runtime/evidence/preflight.txt
          grep -F "Sources: 100" .m12-runtime/evidence/preflight.txt
          grep -F "Valid source rows: 100" .m12-runtime/evidence/preflight.txt
          grep -F "Manifest validity: valid" .m12-runtime/evidence/preflight.txt
          grep -F "Import readiness: ready" .m12-runtime/evidence/preflight.txt
          grep -F "Present: 100" .m12-runtime/evidence/preflight.txt
          grep -F "Missing: 0" .m12-runtime/evidence/preflight.txt

      - name: Run fresh import
        run: |
          DB_BEFORE=0
          START_EPOCH=$(date +%s)
          START_ISO=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          poetry run ke corpus-import "$CORPUS_JSON" \
            | tee .m12-runtime/evidence/fresh-import.txt
          END_EPOCH=$(date +%s)
          END_ISO=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          FRESH_ID=$(sed -n 's/.*Import run ID: //p' .m12-runtime/evidence/fresh-import.txt | tail -1 | tr -d '\r')
          test -n "$FRESH_ID"
          DB_PATH=$(find "$KE_DATA_DIR" -maxdepth 1 -type f -name '*.sqlite3' | head -1)
          test -n "$DB_PATH"
          DB_AFTER=$(stat -c%s "$DB_PATH")
          PAPER_COUNT=$(poetry run python - "$DB_PATH" <<'PY'
          import sqlite3
          import sys
          with sqlite3.connect(sys.argv[1]) as connection:
              print(connection.execute("select count(*) from papers").fetchone()[0])
          PY
          )
          {
            echo "FRESH_ID=$FRESH_ID"
            echo "FRESH_START=$START_ISO"
            echo "FRESH_END=$END_ISO"
            echo "FRESH_SECONDS=$((END_EPOCH - START_EPOCH))"
            echo "DB_BEFORE=$DB_BEFORE"
            echo "DB_AFTER_FRESH=$DB_AFTER"
            echo "PAPERS_AFTER_FRESH=$PAPER_COUNT"
            echo "DB_PATH=$DB_PATH"
          } >> "$GITHUB_ENV"

      - name: Generate fresh report
        run: |
          poetry run ke corpus-run-report "$FRESH_ID" \
            --output .m12-runtime/evidence/fresh-report.md
          grep -F "Declared source rows: 100" .m12-runtime/evidence/fresh-report.md
          grep -F "Persisted import items: 100" .m12-runtime/evidence/fresh-report.md

      - name: Run idempotent resume
        run: |
          START_EPOCH=$(date +%s)
          START_ISO=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          poetry run ke corpus-import "$CORPUS_JSON" --resume-from "$FRESH_ID" \
            | tee .m12-runtime/evidence/resume-import.txt
          END_EPOCH=$(date +%s)
          END_ISO=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          RESUME_ID=$(sed -n 's/.*Import run ID: //p' .m12-runtime/evidence/resume-import.txt | tail -1 | tr -d '\r')
          test -n "$RESUME_ID"
          PAPERS_AFTER_RESUME=$(poetry run python - "$DB_PATH" <<'PY'
          import sqlite3
          import sys
          with sqlite3.connect(sys.argv[1]) as connection:
              print(connection.execute("select count(*) from papers").fetchone()[0])
          PY
          )
          test "$PAPERS_AFTER_RESUME" -eq "$PAPERS_AFTER_FRESH"
          {
            echo "RESUME_ID=$RESUME_ID"
            echo "RESUME_START=$START_ISO"
            echo "RESUME_END=$END_ISO"
            echo "RESUME_SECONDS=$((END_EPOCH - START_EPOCH))"
            echo "PAPERS_AFTER_RESUME=$PAPERS_AFTER_RESUME"
          } >> "$GITHUB_ENV"

      - name: Generate resume report and reviewed aggregate summary
        run: |
          poetry run ke corpus-run-report "$RESUME_ID" \
            --output .m12-runtime/evidence/resume-report.md
          grep -F "Declared source rows: 100" .m12-runtime/evidence/resume-report.md
          grep -F "Persisted import items: 100" .m12-runtime/evidence/resume-report.md
          FAILED_COUNT=$(sed -n 's/^- `failed`: //p' .m12-runtime/evidence/fresh-report.md | head -1)
          FAILED_COUNT=${FAILED_COUNT:-0}
          cp .m12-runtime/preparation-evidence.json .m12-runtime/evidence/
          cp .m12-runtime/corpus/sources.csv .m12-runtime/evidence/selected-sources.csv
          {
            echo "# M12 Real 100-Paper Rehearsal Evidence"
            echo
            echo "- Execution environment: ephemeral GitHub-hosted Ubuntu runner"
            echo "- Exact commit: \`$GITHUB_SHA\`"
            echo "- Source dataset: PMC Open Access Subset via official OA Web Service"
            echo "- Selected local PDFs: 100"
            echo "- Fresh run ID: \`$FRESH_ID\`"
            echo "- Resume run ID: \`$RESUME_ID\`"
            echo "- Fresh elapsed seconds: $FRESH_SECONDS"
            echo "- Resume elapsed seconds: $RESUME_SECONDS"
            echo "- Database bytes before fresh run: $DB_BEFORE"
            echo "- Database bytes after fresh run: $DB_AFTER_FRESH"
            echo "- Paper records after fresh run: $PAPERS_AFTER_FRESH"
            echo "- Paper records after resume: $PAPERS_AFTER_RESUME"
            echo "- Unexpected new papers during resume: 0"
            echo "- Fresh failed-item count: $FAILED_COUNT"
            if [ "$FAILED_COUNT" -eq 0 ]; then
              echo "- Retry evidence: synthetic automated tests only; no real retryable failure occurred"
            else
              echo "- Retry evidence: not automatically attempted because no corrected local cause was established"
            fi
            echo
            echo "PDFs, the SQLite database, extracted text, and private runner paths are not included."
          } > .m12-runtime/evidence/rehearsal-summary.md

      - name: Verify prohibited artifacts are excluded
        run: |
          test "$(find .m12-runtime/evidence -type f -name '*.pdf' | wc -l)" -eq 0
          test "$(find .m12-runtime/evidence -type f -name '*.sqlite3' | wc -l)" -eq 0
          ! grep -R "$GITHUB_WORKSPACE" .m12-runtime/evidence

      - name: Upload sanitized rehearsal evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m12-real-rehearsal-evidence
          path: .m12-runtime/evidence
          if-no-files-found: error
          retention-days: 30
