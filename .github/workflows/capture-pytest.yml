name: Capture pytest failure

on:
  push:
    paths:
      - .github/workflows/capture-pytest.yml

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Check out M10 branch
        uses: actions/checkout@v4
        with:
          ref: feature/m10-duplicate-detection-resumability
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Capture pytest output
        run: |
          set +e
          poetry run pytest -x --tb=short > pytest-failure.txt 2>&1
          status=$?
          echo "exit_status=$status" >> pytest-failure.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pytest-failure.txt
          git rm .github/workflows/capture-pytest.yml
          git commit -m "test: capture pytest failure diagnostics"
          git push origin HEAD:feature/m10-duplicate-detection-resumability
