name: Format repository with Poetry Black

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/format-repo-poetry.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out M10 branch
        uses: actions/checkout@v4
        with:
          ref: feature/m10-duplicate-detection-resumability
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pipx install poetry

      - name: Install locked dependencies
        run: poetry install --no-interaction

      - name: Format all Python files with repository Black
        run: poetry run black .

      - name: Commit formatting and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: format repository with Poetry Black" || true
          git rm .github/workflows/format-repo-poetry.yml
          git commit -m "ci: remove one-use Poetry formatter"
          git push origin HEAD:feature/m10-duplicate-detection-resumability
