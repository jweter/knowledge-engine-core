name: Format M9 footer fix

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'fix/m9-import-run-footer'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: fix/m9-import-run-footer
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Black
        run: python -m pip install black==25.1.0

      - name: Format changed files
        run: python -m black knowledge_engine/cli.py tests/test_cli.py

      - name: Commit formatting and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/format-m9-footer.yml
          git add knowledge_engine/cli.py tests/test_cli.py .github/workflows/format-m9-footer.yml
          git commit -m "style: format M9 import-run footer fix"
          git push origin HEAD:fix/m9-import-run-footer
