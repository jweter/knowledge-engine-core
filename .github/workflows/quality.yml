name: Quality

on:
  pull_request:
  push:
    branches:
      - feature/m10-duplicate-query-decision

permissions:
  contents: write

jobs:
  checks:
    if: github.actor != 'github-actions[bot]'
    name: Apply and verify M10 reporting
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/m10-duplicate-query-decision
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Apply guarded reporting patch
        env:
          PATCHER_B64: 