name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Python quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Check formatting
        run: poetry run ruff format --check .

      - name: Lint
        run: poetry run ruff check .

      - name: Type check
        id: mypy
        continue-on-error: true
        run: |
          set -o pipefail
          poetry run mypy knowledge_engine tests 2>&1 | tee mypy-error.txt

      - name: Upload mypy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-diagnostics
          path: mypy-error.txt

      - name: Fail after mypy diagnostics
        if: steps.mypy.outcome == 'failure'
        run: exit 1

      - name: Test
        run: poetry run pytest

      - name: Check diff hygiene
        run: git diff --check

      - name: Reject temporary delivery artifacts
        run: |
          test ! -e .github/scripts/apply_review_status.py
          test ! -e .github/scripts/normalize_review_status_guards.py
          test ! -e .github/scripts/fix_review_status_tests.py
          test ! -e review-status-delivery.txt
          test ! -e pytest-review-status.txt
          test ! -e review-status-error.txt
