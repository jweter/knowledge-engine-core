name: Quality

on:
  pull_request:
  push:
    branches:
      - feature/m10-duplicate-query-decision

permissions:
  contents: write

jobs:
  checks:
    if: github.actor != 'github-actions[bot]'
    name: Apply and verify review-status upgrade
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/m10-duplicate-query-decision
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Normalize temporary test guards
        run: python .github/scripts/normalize_review_status_guards.py

      - name: Apply guarded review-status patch
        run: |
          python .github/scripts/apply_review_status.py
          python .github/scripts/fix_review_status_tests.py

      - name: Remove temporary patchers before checks
        run: rm .github/scripts/apply_review_status.py .github/scripts/normalize_review_status_guards.py .github/scripts/fix_review_status_tests.py

      - name: Format
        run: poetry run ruff format .

      - name: Check formatting
        run: poetry run ruff format --check .

      - name: Lint
        run: poetry run ruff check .

      - name: Type check
        run: poetry run mypy knowledge_engine tests

      - name: Test
        run: poetry run pytest

      - name: Check diff hygiene
        run: git diff --check

      - name: Commit and push verified review-status upgrade
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f poetry.lock review-status-delivery.txt pytest-review-status.txt review-status-error.txt
          git add knowledge_engine tests .github/scripts
          git commit -m "feat(import): separate execution and review status"
          git push origin HEAD:feature/m10-duplicate-query-decision
