name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Python quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Check metadata module formatting
        run: poetry run ruff format --check knowledge_engine/metadata_enrichment.py

      - name: Check metadata tests formatting
        run: poetry run ruff format --check tests/test_metadata_enrichment.py

      - name: Check package formatting
        run: poetry run ruff format --check knowledge_engine

      - name: Check test formatting
        run: poetry run ruff format --check tests

      - name: Lint
        run: poetry run ruff check .

      - name: Type check
        run: poetry run mypy knowledge_engine tests

      - name: Test
        run: poetry run pytest

      - name: Check diff hygiene
        run: git diff --check

      - name: Reject temporary delivery artifacts
        run: |
          test ! -e .github/scripts/apply_review_status.py
          test ! -e .github/scripts/normalize_review_status_guards.py
          test ! -e .github/scripts/fix_review_status_tests.py
          test ! -e review-status-delivery.txt
          test ! -e pytest-review-status.txt
          test ! -e review-status-error.txt
