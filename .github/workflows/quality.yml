# one-use verified CLI adapter
name: Quality

on:
  pull_request:

permissions:
  contents: write

jobs:
  checks:
    if: github.actor != 'github-actions[bot]'
    name: Apply and verify M10 CLI adapter
    runs-on: ubuntu-latest

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/m10-duplicate-query-decision
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Apply guarded CLI adapter
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("knowledge_engine/cli.py")
          text = path.read_text(encoding="utf-8")

          old = "from knowledge_engine.import_runs import ImportRunService\nfrom knowledge_engine.import_runs.ingestion import CorpusIngestionService, ImportedCorpusRun\n"
          new = "from knowledge_engine.import_runs import ImportRunService\nfrom knowledge_engine.import_runs.cli_modes import resolve_corpus_import_mode\nfrom knowledge_engine.import_runs.ingestion import CorpusIngestionService, ImportedCorpusRun\nfrom knowledge_engine.import_runs.linked_ingestion import LinkedCorpusIngestionService\n"
          if old not in text:
              raise SystemExit("expected CLI import block not found")
          text = text.replace(old, new, 1)

          old = "CheckFilesOption = Annotated[\n    bool,\n    typer.Option(\"--check-files\", help=\"Evaluate local PDF file readiness.\"),\n]\n"
          new = "CheckFilesOption = Annotated[\n    bool,\n    typer.Option(\"--check-files\", help=\"Evaluate local PDF file readiness.\"),\n]\nResumeFromOption = Annotated[\n    str | None,\n    typer.Option(\"--resume-from\", help=\"Create an immutable resume run from this run UUID.\"),\n]\nRetryFailedFromOption = Annotated[\n    str | None,\n    typer.Option(\n        \"--retry-failed-from\",\n        help=\"Create an immutable retry run for failed items from this run UUID.\",\n    ),\n]\n"
          if old not in text:
              raise SystemExit("expected CLI option block not found")
          text = text.replace(old, new, 1)

          old = '''@app.command("corpus-import")
def corpus_import(corpus_json: CorpusJsonArgument) -> None:
    """Persist and import a local corpus."""

    database = _database()
    database.initialize()
    try:
        with database.session() as session:
            imported = CorpusIngestionService(
                session, project_root=database.settings.project_root
            ).import_corpus(corpus_json)
    except Exception:
        raise typer.BadParameter(
            "Corpus import did not complete due to an internal error."
        ) from None

    console.print("[bold]Corpus import finished[/bold]")
'''
          new = '''@app.command("corpus-import")
def corpus_import(
    corpus_json: CorpusJsonArgument,
    resume_from: ResumeFromOption = None,
    retry_failed_from: RetryFailedFromOption = None,
) -> None:
    """Persist and import a fresh, resumed, or failed-item retry corpus run."""

    try:
        resolved_mode = resolve_corpus_import_mode(
            resume_from=resume_from,
            retry_failed_from=retry_failed_from,
        )
    except ValueError as exc:
        raise typer.BadParameter(str(exc)) from exc

    database = _database()
    database.initialize()
    try:
        with database.session() as session:
            if resolved_mode.is_linked:
                assert resolved_mode.mode is not None
                assert resolved_mode.parent_import_run_id is not None
                imported = LinkedCorpusIngestionService(
                    session, project_root=database.settings.project_root
                ).import_linked_corpus(
                    corpus_json,
                    parent_import_run_id=resolved_mode.parent_import_run_id,
                    mode=resolved_mode.mode,
                )
            else:
                imported = CorpusIngestionService(
                    session, project_root=database.settings.project_root
                ).import_corpus(corpus_json)
    except Exception:
        raise typer.BadParameter(
            "Corpus import did not complete due to an internal error."
        ) from None

    console.print("[bold]Corpus import finished[/bold]")
'''
          if old not in text:
              raise SystemExit("expected corpus-import command block not found")
          text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")
          PY

          cat > tests/test_cli_linked_import_options.py <<'PY'
          """CLI adapter tests for immutable resume and retry corpus imports."""

          from pathlib import Path

          import pytest
          from sqlalchemy.orm import Session
          from typer.testing import CliRunner

          import knowledge_engine.cli as cli
          from knowledge_engine.cli import app
          from knowledge_engine.import_runs import ImportRunService
          from knowledge_engine.import_runs.ingestion import ImportedCorpusRun
          from tests.test_cli import write_cli_corpus


          def test_corpus_import_rejects_conflicting_parent_options(tmp_path: Path) -> None:
              corpus_path = write_cli_corpus(tmp_path)

              result = CliRunner().invoke(
                  app,
                  [
                      "corpus-import",
                      str(corpus_path),
                      "--resume-from",
                      "run-one",
                      "--retry-failed-from",
                      "run-two",
                  ],
              )

              assert result.exit_code == 2
              assert "mutually exclusive" in result.output
              assert not (tmp_path / "data" / "knowledge_engine.sqlite3").exists()


          @pytest.mark.parametrize(
              ("option", "expected_mode"),
              [
                  ("--resume-from", "resume"),
                  ("--retry-failed-from", "retry_failed"),
              ],
          )
          def test_corpus_import_routes_linked_options(
              tmp_path: Path,
              monkeypatch: pytest.MonkeyPatch,
              option: str,
              expected_mode: str,
          ) -> None:
              corpus_path = write_cli_corpus(tmp_path)
              monkeypatch.chdir(tmp_path)
              calls: list[tuple[str, str]] = []

              class StubLinkedCorpusIngestionService:
                  def __init__(
                      self, session: Session, *, project_root: Path | None = None
                  ) -> None:
                      self.session = session
                      self.project_root = project_root or tmp_path

                  def import_linked_corpus(
                      self,
                      path: Path,
                      *,
                      parent_import_run_id: str,
                      mode: str,
                  ) -> ImportedCorpusRun:
                      calls.append((parent_import_run_id, mode))
                      persisted = ImportRunService(
                          self.session, project_root=self.project_root
                      ).create_run(path, check_files=True)
                      run = ImportRunService(
                          self.session, project_root=self.project_root
                      ).get_run(persisted.import_run_id)
                      assert run is not None
                      run.run_mode = mode
                      run.parent_import_run_id = parent_import_run_id
                      run.run_status = "succeeded"
                      run.items[0].item_status = "skipped"
                      self.session.flush()
                      return ImportedCorpusRun(
                          import_run_id=run.import_run_id,
                          run_status=run.run_status,
                          imported_count=0,
                          failed_count=0,
                          skipped_count=1,
                      )

              monkeypatch.setattr(
                  cli,
                  "LinkedCorpusIngestionService",
                  StubLinkedCorpusIngestionService,
              )

              result = CliRunner().invoke(
                  app,
                  ["corpus-import", str(corpus_path), option, " parent-run "],
              )

              assert result.exit_code == 0
              assert calls == [("parent-run", expected_mode)]
              assert "Corpus import finished" in result.output
              assert "Skipped items: 1" in result.output
          PY

          poetry run black knowledge_engine/cli.py tests/test_cli_linked_import_options.py

      - name: Verify complete gate
        run: |
          poetry run black --check .
          poetry run ruff check .
          poetry run mypy knowledge_engine tests
          poetry run pytest
          git diff --check

      - name: Restore standard Quality workflow and commit
        run: |
          cat > .github/workflows/quality.yml <<'YAML'
          name: Quality

          on:
            pull_request:
            push:
              branches:
                - main

          jobs:
            checks:
              name: Python quality checks
              runs-on: ubuntu-latest

              steps:
                - name: Check out repository
                  uses: actions/checkout@v4

                - name: Set up Python
                  uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"

                - name: Install Poetry
                  run: python -m pip install poetry

                - name: Install dependencies
                  run: poetry install

                - name: Check formatting
                  run: poetry run black --check .

                - name: Lint
                  run: poetry run ruff check .

                - name: Type check
                  run: poetry run mypy knowledge_engine tests

                - name: Test
                  run: poetry run pytest
          YAML
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge_engine/cli.py tests/test_cli_linked_import_options.py .github/workflows/quality.yml
          git commit -m "cli: expose immutable resume and retry imports"
          git push origin HEAD:feature/m10-duplicate-query-decision
