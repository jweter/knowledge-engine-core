name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Python quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Format linked ingestion files
        run: |
          poetry run black knowledge_engine/import_runs/linked_ingestion.py tests/test_linked_ingestion.py
          mkdir -p black-output/knowledge_engine/import_runs black-output/tests
          cp knowledge_engine/import_runs/linked_ingestion.py black-output/knowledge_engine/import_runs/
          cp tests/test_linked_ingestion.py black-output/tests/

      - name: Upload exact Black output
        uses: actions/upload-artifact@v4
        with:
          name: linked-ingestion-black-output
          path: black-output

      - name: Check formatting
        run: poetry run black --check .

      - name: Lint
        run: poetry run ruff check .

      - name: Type check
        run: poetry run mypy knowledge_engine tests

      - name: Test
        run: poetry run pytest
