name: Format M10 schema files

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/format-m10-schema.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out M10 branch
        uses: actions/checkout@v4
        with:
          ref: feature/m10-duplicate-detection-resumability
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Black
        run: pip install black==24.10.0

      - name: Format exact files
        run: black knowledge_engine/database.py tests/test_schema_v2.py

      - name: Commit formatted files and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge_engine/database.py tests/test_schema_v2.py
          git commit -m "style: format M10 schema implementation" || true
          git rm .github/workflows/format-m10-schema.yml
          git commit -m "ci: remove one-use M10 formatter"
          git push origin HEAD:feature/m10-duplicate-detection-resumability
