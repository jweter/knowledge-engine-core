name: Format M10 schema files

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.ref == 'feature/m10-duplicate-detection-resumability'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Black
        run: pip install black==25.1.0

      - name: Format files
        run: black knowledge_engine/database.py tests/test_schema_v2.py

      - name: Remove one-use formatter
        run: rm .github/workflows/format-m10-schema.yml

      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge_engine/database.py tests/test_schema_v2.py .github/workflows/format-m10-schema.yml
          git commit -m "style: format M10 schema migration files"
          git push
