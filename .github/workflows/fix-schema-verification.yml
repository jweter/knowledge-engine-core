name: Repair schema verification invariant

on:
  push:
    paths:
      - .github/workflows/fix-schema-verification.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out M10 branch
        uses: actions/checkout@v4
        with:
          ref: feature/m10-duplicate-detection-resumability
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Repair schema verification and restore diagnostics
        run: |
          python - <<'PY'
          from pathlib import Path

          database_path = Path("knowledge_engine/database.py")
          text = database_path.read_text()
          old = """        Base.metadata.create_all(connection)\n\n        if existing_version < 2:\n"""
          new = """        if existing_version == 0:\n            Base.metadata.create_all(connection)\n        else:\n            _verify_expected_tables(connection)\n            Base.metadata.create_all(connection)\n\n        if existing_version < 2:\n"""
          if old not in text:
              raise SystemExit("migration insertion point not found")
          text = text.replace(old, new, 1)

          old_verify = """def _verify_schema_complete(connection: Connection) -> None:\n    expected_tables = set(Base.metadata.tables)\n    existing_tables = set(\n        connection.execute(text(\"SELECT name FROM sqlite_master WHERE type='table'\")).scalars()\n    )\n    missing_tables = sorted(expected_tables - existing_tables)\n    if missing_tables:\n        missing = \", \".join(missing_tables)\n        msg = f\"Database schema version {CURRENT_SCHEMA_VERSION} is incomplete; missing: {missing}.\"\n        raise RuntimeError(msg)\n\n"""
          new_verify = """def _verify_expected_tables(connection: Connection) -> None:\n    expected_tables = set(Base.metadata.tables)\n    existing_tables = set(\n        connection.execute(text(\"SELECT name FROM sqlite_master WHERE type='table'\")).scalars()\n    )\n    missing_tables = sorted(expected_tables - existing_tables)\n    if missing_tables:\n        missing = \", \".join(missing_tables)\n        msg = f\"Database schema version {CURRENT_SCHEMA_VERSION} is incomplete; missing: {missing}.\"\n        raise RuntimeError(msg)\n\n\ndef _verify_schema_complete(connection: Connection) -> None:\n    _verify_expected_tables(connection)\n\n"""
          if old_verify not in text:
              raise SystemExit("schema verification block not found")
          database_path.write_text(text.replace(old_verify, new_verify, 1))

          quality_path = Path(".github/workflows/quality.yml")
          quality = quality_path.read_text()
          quality_path.write_text(quality.replace("poetry run pytest -x --tb=short", "poetry run pytest"))
          PY

          rm -f pytest-failure.txt
          poetry run black .
          poetry run black --check .
          poetry run ruff check .
          poetry run mypy knowledge_engine tests
          poetry run pytest -rs
          git diff --check

      - name: Commit verified repair and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge_engine/database.py .github/workflows/quality.yml
          git rm -f pytest-failure.txt .github/workflows/fix-schema-verification.yml
          git commit -m "fix: preserve schema completeness verification"
          git push origin HEAD:feature/m10-duplicate-detection-resumability
