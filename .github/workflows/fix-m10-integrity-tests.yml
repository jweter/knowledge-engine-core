name: Fix M10 integrity tests

on:
  push:
    branches:
      - feature/m10-duplicate-query-decision
    paths:
      - .github/workflows/fix-m10-integrity-tests.yml

permissions:
  contents: write

jobs:
  repair-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/m10-duplicate-query-decision
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install poetry
      - run: poetry install
      - name: Apply type-safe ordering and restore Quality
        run: |
          python - <<'PY'
          from pathlib import Path

          test_path = Path("tests/test_duplicate_ingestion.py")
          text = test_path.read_text(encoding="utf-8")
          old = "first, second = sorted(run.items, key=lambda item: item.csv_line_number)"
          new = "first, second = sorted(run.items, key=lambda item: item.csv_line_number or 0)"
          if old not in text:
              raise SystemExit("expected nullable sort key not found")
          test_path.write_text(text.replace(old, new), encoding="utf-8")

          Path(".github/workflows/quality.yml").write_text(
              '''name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Python quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Check formatting
        run: poetry run black --check .

      - name: Lint
        run: poetry run ruff check .

      - name: Type check
        run: poetry run mypy knowledge_engine tests

      - name: Test
        run: poetry run pytest
''',
              encoding="utf-8",
          )
          PY
          poetry run black tests/test_duplicate_ingestion.py
      - name: Verify complete gate
        run: |
          poetry run black --check .
          poetry run ruff check .
          poetry run mypy knowledge_engine tests
          poetry run pytest
          git diff --check
      - name: Commit repair and remove helper
        run: |
          rm .github/workflows/fix-m10-integrity-tests.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_duplicate_ingestion.py .github/workflows/quality.yml .github/workflows/fix-m10-integrity-tests.yml
          git commit -m "test: harden duplicate rerun integrity coverage"
          git push origin HEAD:feature/m10-duplicate-query-decision
