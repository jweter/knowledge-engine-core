name: Apply M10 linked ingestion

on:
  push:
    branches:
      - feature/m10-duplicate-query-decision
    paths:
      - .github/workflows/apply-m10-linked-ingestion.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/m10-duplicate-query-decision
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install poetry
      - run: poetry install
      - name: Apply linked ingestion integration
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("knowledge_engine/import_runs/ingestion.py")
          text = path.read_text(encoding="utf-8")

          old = "from knowledge_engine.import_runs._helpers import new_uuid, utc_now\nfrom knowledge_engine.import_runs.repository import ImportRunRepository\nfrom knowledge_engine.import_runs.service import ImportRunService\n"
          new = "from knowledge_engine.import_runs._helpers import new_uuid, utc_now\nfrom knowledge_engine.import_runs.linked import LinkedImportRunService\nfrom knowledge_engine.import_runs.repository import ImportRunRepository\nfrom knowledge_engine.import_runs.resume import RunMode\nfrom knowledge_engine.import_runs.service import ImportRunService\n"
          if old not in text:
              raise SystemExit("expected ingestion import block not found")
          text = text.replace(old, new, 1)

          old = "        self.repository = ImportRunRepository(session)\n        self.run_service = ImportRunService(session, project_root=self.project_root)\n\n    def import_corpus(self, corpus_path: Path) -> ImportedCorpusRun:\n        \"\"\"Validate, persist, and import a local corpus without downloading documents.\"\"\"\n\n        persisted = self.run_service.create_run(corpus_path, check_files=True)\n"
          new = "        self.repository = ImportRunRepository(session)\n        self.run_service = ImportRunService(session, project_root=self.project_root)\n        self.linked_run_service = LinkedImportRunService(\n            session, project_root=self.project_root\n        )\n\n    def import_corpus(\n        self,\n        corpus_path: Path,\n        *,\n        parent_import_run_id: str | None = None,\n        mode: RunMode | None = None,\n    ) -> ImportedCorpusRun:\n        \"\"\"Validate, persist, and import a local corpus without downloading documents.\"\"\"\n\n        if (parent_import_run_id is None) != (mode is None):\n            raise ValueError(\n                \"parent_import_run_id and mode must be provided together for a linked run.\"\n            )\n        if parent_import_run_id is None:\n            persisted = self.run_service.create_run(corpus_path, check_files=True)\n        else:\n            assert mode is not None\n            persisted = self.linked_run_service.create_linked_run(\n                corpus_path,\n                parent_import_run_id=parent_import_run_id,\n                mode=mode,\n                check_files=True,\n            )\n"
          if old not in text:
              raise SystemExit("expected import_corpus block not found")
          text = text.replace(old, new, 1)

          old = "def _should_import_item(item: ImportItem) -> bool:\n    return (\n        not item.blocks_manifest\n"
          new = "def _should_import_item(item: ImportItem) -> bool:\n    return (\n        item.item_status == \"valid\"\n        and not item.blocks_manifest\n"
          if old not in text:
              raise SystemExit("expected _should_import_item block not found")
          text = text.replace(old, new, 1)
          path.write_text(text, encoding="utf-8")
          PY

          cat > tests/test_linked_ingestion.py <<'PY'
          """Integration tests for linked resume/retry corpus ingestion."""

          from pathlib import Path

          from knowledge_engine.import_runs.ingestion import CorpusIngestionService
          from tests.corpus_fixtures import get_run, make_database
          from tests.test_corpus_import import StubParser, declare_pdf, make_corpus, parsed_paper, source_row


          def test_resume_does_not_reparse_prior_success(tmp_path: Path) -> None:
              database = make_database(tmp_path)
              corpus_path = make_corpus(
                  tmp_path,
                  rows=[source_row(local_path="paper.pdf", doi="10.1234/source")],
              )
              paper_path = declare_pdf(tmp_path, "paper.pdf")
              first_parser = StubParser(
                  {
                      "paper.pdf": parsed_paper(
                          paper_path,
                          title="Imported",
                          doi="10.1234/source",
                          content_hash="a" * 64,
                      )
                  }
              )
              with database.session() as session:
                  first = CorpusIngestionService(
                      session, project_root=tmp_path, parser=first_parser
                  ).import_corpus(corpus_path)

              with database.session() as session:
                  resumed = CorpusIngestionService(
                      session, project_root=tmp_path, parser=StubParser({})
                  ).import_corpus(
                      corpus_path,
                      parent_import_run_id=first.import_run_id,
                      mode="resume",
                  )

              run = get_run(database, resumed.import_run_id)
              assert resumed.run_status == "succeeded"
              assert resumed.imported_count == 0
              assert resumed.failed_count == 0
              assert resumed.skipped_count == 1
              assert run.run_mode == "resume"
              assert run.parent_import_run_id == first.import_run_id
              assert run.items[0].item_status == "skipped"
              assert run.items[0].matched_import_item_id is not None


          def test_retry_failed_processes_only_failed_parent_item(tmp_path: Path) -> None:
              database = make_database(tmp_path)
              corpus_path = make_corpus(
                  tmp_path,
                  rows=[
                      source_row(
                          source_id="failed-source",
                          local_path="failed.pdf",
                          doi="10.1234/failed",
                      ),
                      source_row(
                          source_id="success-source",
                          local_path="success.pdf",
                          doi="10.1234/success",
                      ),
                  ],
              )
              failed_path = declare_pdf(tmp_path, "failed.pdf")
              success_path = declare_pdf(tmp_path, "success.pdf")
              with database.session() as session:
                  first = CorpusIngestionService(
                      session,
                      project_root=tmp_path,
                      parser=StubParser(
                          {
                              "failed.pdf": RuntimeError("parse failure"),
                              "success.pdf": parsed_paper(
                                  success_path,
                                  title="Success",
                                  doi="10.1234/success",
                                  content_hash="b" * 64,
                              ),
                          }
                      ),
                  ).import_corpus(corpus_path)

              with database.session() as session:
                  retried = CorpusIngestionService(
                      session,
                      project_root=tmp_path,
                      parser=StubParser(
                          {
                              "failed.pdf": parsed_paper(
                                  failed_path,
                                  title="Recovered",
                                  doi="10.1234/failed",
                                  content_hash="c" * 64,
                              ),
                              "success.pdf": AssertionError(
                                  "prior success must not be parsed during retry"
                              ),
                          }
                      ),
                  ).import_corpus(
                      corpus_path,
                      parent_import_run_id=first.import_run_id,
                      mode="retry_failed",
                  )

              parent = get_run(database, first.import_run_id)
              run = get_run(database, retried.import_run_id)
              items = {item.source_id: item for item in run.items}
              parent_items = {item.source_id: item for item in parent.items}
              assert retried.run_status == "succeeded"
              assert retried.imported_count == 1
              assert retried.failed_count == 0
              assert retried.skipped_count == 1
              assert run.run_mode == "retry_failed"
              assert items["failed-source"].item_status == "imported"
              assert (
                  items["failed-source"].retry_of_import_item_id
                  == parent_items["failed-source"].import_item_id
              )
              assert items["success-source"].item_status == "skipped"
              assert parent_items["failed-source"].item_status == "failed"
              assert parent_items["success-source"].item_status == "imported"
          PY

          poetry run black knowledge_engine/import_runs/ingestion.py tests/test_linked_ingestion.py
      - name: Verify complete gate
        run: |
          poetry run black --check .
          poetry run ruff check .
          poetry run mypy knowledge_engine tests
          poetry run pytest
          git diff --check
      - name: Commit verified integration and remove helper
        run: |
          rm .github/workflows/apply-m10-linked-ingestion.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add knowledge_engine/import_runs/ingestion.py tests/test_linked_ingestion.py .github/workflows/apply-m10-linked-ingestion.yml
          git commit -m "feat: integrate linked resume and retry ingestion"
          git push origin HEAD:feature/m10-duplicate-query-decision
