name: M14 Mass Discovery

on:
  workflow_dispatch:
    inputs:
      query:
        description: PubMed search expression
        required: true
        default: >-
          (obesity OR overweight OR "type 2 diabetes" OR "metabolic syndrome")
          AND (treatment OR therapy OR intervention OR pharmacotherapy OR
          semaglutide OR liraglutide OR tirzepatide OR metformin OR
          "SGLT2 inhibitor") AND pubmed pmc open access[filter]
        type: string
      limit:
        description: Requested unique candidate count
        required: true
        default: '3250'
        type: string
      page_size:
        description: Bounded PubMed page size
        required: true
        default: '100'
        type: string
      select_count:
        description: Accepted records to select and acquire
        required: true
        default: '500'
        type: string
  pull_request:
    paths:
      - '.github/workflows/m14-mass-discovery.yml'
      - 'knowledge_engine/pubmed_batch_discovery.py'
      - 'knowledge_engine/pubmed_discovery.py'
      - 'knowledge_engine/ncbi_http.py'
      - 'knowledge_engine/candidate_review.py'
      - 'knowledge_engine/candidate_review_cli.py'
      - 'knowledge_engine/reviewed_approval.py'
      - 'knowledge_engine/reviewed_approval_cli.py'
      - 'knowledge_engine/pmc_acquisition.py'
      - 'knowledge_engine/manifest_curation.py'
      - 'knowledge_engine/manifest_curation_cli.py'
      - 'knowledge_engine/corpus_readiness.py'
      - 'knowledge_engine/corpus_readiness_cli.py'
      - 'knowledge_engine/entrypoint.py'
      - 'scripts/m14_pubmed_batch_discover.py'
      - 'pyproject.toml'
      - 'poetry.lock'

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DISCOVERY_QUERY: >-
        ${{ github.event_name == 'workflow_dispatch' && inputs.query ||
        '(obesity OR overweight OR "type 2 diabetes" OR "metabolic syndrome") AND
        (treatment OR therapy OR intervention OR pharmacotherapy OR semaglutide OR
        liraglutide OR tirzepatide OR metformin OR "SGLT2 inhibitor") AND
        pubmed pmc open access[filter]' }}
      DISCOVERY_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.limit || '150' }}
      DISCOVERY_PAGE_SIZE: ${{ github.event_name == 'workflow_dispatch' && inputs.page_size || '100' }}
      SELECT_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.select_count || '10' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Validate bounded inputs
        shell: bash
        run: |
          python - <<'PY'
          import os

          limit = int(os.environ['DISCOVERY_LIMIT'])
          page_size = int(os.environ['DISCOVERY_PAGE_SIZE'])
          select_count = int(os.environ['SELECT_COUNT'])
          query = os.environ['DISCOVERY_QUERY'].strip()
          if not query:
              raise SystemExit('Discovery query must not be empty.')
          if not 150 <= limit <= 5000:
              raise SystemExit('Discovery limit must be between 150 and 5000.')
          if not 1 <= page_size <= 100:
              raise SystemExit('Page size must be between 1 and 100.')
          if not 1 <= select_count <= limit:
              raise SystemExit('Select count must be between 1 and the discovery limit.')
          PY

      - name: Run bounded mass discovery
        shell: bash
        run: |
          mkdir -p work/m14
          set -o pipefail
          poetry run python scripts/m14_pubmed_batch_discover.py \
            --query "$DISCOVERY_QUERY" \
            --limit "$DISCOVERY_LIMIT" \
            --page-size "$DISCOVERY_PAGE_SIZE" \
            --output work/m14/pubmed-candidates.json \
            2>&1 | tee work/m14/discovery.log

      - name: Adjudicate candidate evidence
        run: |
          poetry run python -m knowledge_engine.candidate_review_cli prepare \
            --candidates work/m14/pubmed-candidates.json \
            --output work/m14/candidate-review.json

      - name: Select bounded accepted records
        run: |
          poetry run python -m knowledge_engine.reviewed_approval_cli export \
            --worksheet work/m14/candidate-review.json \
            --output work/m14/approvals-500.json \
            --limit "$SELECT_COUNT"

      - name: Preflight bounded approvals before network access
        run: |
          poetry run python - <<'PY'
          import json
          import os
          from pathlib import Path

          select_count = int(os.environ['SELECT_COUNT'])
          approvals = json.loads(
              Path('work/m14/approvals-500.json').read_text(encoding='utf-8')
          )
          rows = approvals.get('approvals')
          if approvals.get('schema_version') != 1:
              raise SystemExit('Approval schema version does not reconcile.')
          if approvals.get('selected_count') != select_count:
              raise SystemExit('Approval selected count must match the requested select count.')
          if not isinstance(rows, list) or len(rows) != select_count:
              raise SystemExit('Approval row count must match the requested select count.')
          for field in ('pmid', 'pmcid', 'filename'):
              if len({row[field] for row in rows}) != select_count:
                  raise SystemExit(f'Approval file contains duplicate {field} values.')
          PY

      - name: Acquire bounded approved PDFs
        shell: bash
        run: |
          mkdir -p work/m14/papers
          set -o pipefail
          poetry run ke pmc-oa-acquire \
            --candidates work/m14/pubmed-candidates.json \
            --approvals work/m14/approvals-500.json \
            --papers-dir work/m14/papers \
            --receipt work/m14/acquisition-receipt.json \
            2>&1 | tee work/m14/acquisition.log

      - name: Summarize and reconcile M14 acquisition
        run: |
          poetry run python - <<'PY'
          import hashlib
          import json
          import os
          from collections import Counter
          from pathlib import Path

          select_count = int(os.environ['SELECT_COUNT'])
          payload = json.loads(Path('work/m14/pubmed-candidates.json').read_text(encoding='utf-8'))
          worksheet = json.loads(Path('work/m14/candidate-review.json').read_text(encoding='utf-8'))
          approvals = json.loads(Path('work/m14/approvals-500.json').read_text(encoding='utf-8'))
          receipt = json.loads(Path('work/m14/acquisition-receipt.json').read_text(encoding='utf-8'))
          papers_dir = Path('work/m14/papers')
          candidates = payload['candidates']
          items = worksheet['items']
          candidate_count = payload['candidate_count']
          pmcid_resolved = sum(candidate['pmcid'] is not None for candidate in candidates)
          oa_verified = sum(candidate['open_access'] for candidate in candidates)
          if worksheet['candidate_count'] != candidate_count:
              raise SystemExit('Candidate adjudication count does not reconcile.')
          if any(candidate['metadata_source'] != 'pubmed_efetch' for candidate in candidates):
              raise SystemExit('PubMed metadata provenance does not reconcile.')
          if any(
              candidate['pmcid'] is not None and candidate['pmcid_source'] != 'pmc_id_converter'
              for candidate in candidates
          ):
              raise SystemExit('PMCID provenance does not reconcile.')
          if any(
              candidate['open_access'] and candidate['oa_source'] != 'pmc_cloud_service'
              for candidate in candidates
          ):
              raise SystemExit('PMC OA provenance does not reconcile.')
          decisions = Counter(item['decision'] for item in items)
          if set(decisions) - {'accepted', 'rejected', 'held'}:
              raise SystemExit('Candidate adjudication contains an unsupported decision.')
          if sum(decisions.values()) != worksheet['candidate_count']:
              raise SystemExit('Candidate decision counts do not reconcile.')
          if approvals.get('schema_version') != 1:
              raise SystemExit('Approval schema version does not reconcile.')
          if approvals.get('rules_version') != worksheet.get('rules_version'):
              raise SystemExit('Approval rules version does not reconcile.')
          if approvals.get('selection_rule') != 'accepted_in_worksheet_order':
              raise SystemExit('Approval selection rule does not reconcile.')
          if approvals.get('source_candidate_count') != candidate_count:
              raise SystemExit('Approval source candidate count does not reconcile.')
          if approvals.get('source_accepted_count') != decisions['accepted']:
              raise SystemExit('Approval source accepted count does not reconcile.')
          if approvals.get('selected_count') != select_count:
              raise SystemExit('Approval selected count must match the requested select count.')
          approval_rows = approvals.get('approvals', [])
          if len(approval_rows) != select_count:
              raise SystemExit('Approval row count must match the requested select count.')
          if receipt.get('schema_version') != 1 or receipt.get('acquired_count') != select_count:
              raise SystemExit('Acquisition receipt count must match the requested select count.')
          receipt_items = receipt.get('items', [])
          if not isinstance(receipt_items, list) or len(receipt_items) != select_count:
              raise SystemExit('Acquisition receipt item count must match the requested select count.')
          for field in ('pmid', 'pmcid', 'filename'):
              if len({item[field] for item in receipt_items}) != select_count:
                  raise SystemExit(f'Acquisition receipt contains duplicate {field} values.')
          approved_by_pmid = {item['pmid']: item for item in approval_rows}
          total_pdf_bytes = 0
          for item in receipt_items:
              approval = approved_by_pmid.get(item['pmid'])
              if approval is None:
                  raise SystemExit('Receipt references an unapproved PMID.')
              for field in ('pmcid', 'license', 'filename'):
                  if item[field] != approval[field]:
                      raise SystemExit('Receipt evidence does not reconcile to approval evidence.')
              path = papers_dir / item['filename']
              if not path.is_file() or path.is_symlink():
                  raise SystemExit('Approved local PDF is missing or unsafe.')
              body = path.read_bytes()
              if not body.startswith(b'%PDF-'):
                  raise SystemExit('Approved local file does not have a PDF signature.')
              if len(body) != item['byte_count']:
                  raise SystemExit('Receipt byte count does not match the local PDF.')
              if hashlib.sha256(body).hexdigest() != item['sha256']:
                  raise SystemExit('Receipt checksum does not match the local PDF.')
              total_pdf_bytes += len(body)
          if len(list(papers_dir.glob('*.pdf'))) != select_count:
              raise SystemExit('Local PDF directory must contain exactly the requested select count of PDFs.')
          pmcid_resolution_rate = pmcid_resolved / candidate_count if candidate_count else 0.0
          oa_verification_rate = oa_verified / candidate_count if candidate_count else 0.0
          summary = (
              f"candidate_count={candidate_count}\n"
              f"adjudication_item_count={worksheet['candidate_count']}\n"
              f"accepted={decisions['accepted']}\n"
              f"rejected={decisions['rejected']}\n"
              f"held={decisions['held']}\n"
              f"selected_count={approvals['selected_count']}\n"
              f"selection_rule={approvals['selection_rule']}\n"
              f"acquired_count={receipt['acquired_count']}\n"
              f"total_pdf_bytes={total_pdf_bytes}\n"
              f"fetched_page_count={payload['fetched_page_count']}\n"
              f"duplicate_pmids_removed={payload['duplicate_pmids_removed']}\n"
              f"pmcid_resolved={pmcid_resolved}\n"
              f"pmcid_resolution_rate={pmcid_resolution_rate:.6f}\n"
              f"oa_verified={oa_verified}\n"
              f"oa_verification_rate={oa_verification_rate:.6f}\n"
              f"exhausted={payload['exhausted']}\n"
          )
          Path('work/m14/summary.txt').write_text(summary, encoding='utf-8')
          print(summary, end='')
          PY

      - name: Export manifest curation draft
        run: |
          poetry run python -m knowledge_engine.manifest_curation_cli export \
            --worksheet work/m14/candidate-review.json \
            --receipt work/m14/acquisition-receipt.json \
            --output work/m14/manifest-draft.csv

      - name: Validate corpus readiness
        run: |
          poetry run python -m knowledge_engine.corpus_readiness_cli validate \
            --manifest work/m14/manifest-draft.csv \
            --receipt work/m14/acquisition-receipt.json \
            --papers-dir work/m14/papers \
            --output work/m14/readiness-report.json \
            --expected-count "$SELECT_COUNT"

      - name: Upload M14 evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m14-pubmed-candidates
          path: |
            work/m14/discovery.log
            work/m14/acquisition.log
            work/m14/pubmed-candidates.json
            work/m14/candidate-review.json
            work/m14/approvals-500.json
            work/m14/acquisition-receipt.json
            work/m14/manifest-draft.csv
            work/m14/readiness-report.json
            work/m14/summary.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Upload approved PDF artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: m14-approved-pdfs
          path: work/m14/papers/*.pdf
          if-no-files-found: error
          retention-days: 3
