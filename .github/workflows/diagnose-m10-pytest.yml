name: Diagnose M10 pytest

on:
  push:
    paths:
      - .github/workflows/diagnose-m10-pytest.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feature/m10-duplicate-detection-resumability

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: python -m pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Capture pytest output
        shell: bash
        run: |
          set +e
          poetry run pytest -vv -ra > pytest-output.txt 2>&1
          status=$?
          cat pytest-output.txt
          exit $status

      - name: Upload pytest output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m10-pytest-output
          path: pytest-output.txt
