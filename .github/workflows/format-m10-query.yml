name: Format M10 query layer

on:
  push:
    branches:
      - feature/m10-duplicate-query-decision

permissions:
  contents: write

jobs:
  format-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/m10-duplicate-query-decision
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction
      - name: Format exact files
        run: poetry run black knowledge_engine/duplicate_queries.py tests/test_duplicate_queries.py
      - name: Verify complete gate
        run: |
          poetry run black --check .
          poetry run ruff check .
          poetry run mypy knowledge_engine tests
          poetry run pytest -rs
          git diff --check
      - name: Commit formatting and remove workflow
        run: |
          rm .github/workflows/format-m10-query.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add knowledge_engine/duplicate_queries.py tests/test_duplicate_queries.py .github/workflows/format-m10-query.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'style: apply Poetry-pinned Black to M10 query layer'
          git push origin HEAD:feature/m10-duplicate-query-decision
