name: Apply M9 footer patch

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Normalize and apply patch
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          source = Path('m9-footer-fix.patch').read_text(encoding='utf-8-sig')
          normalized = source.replace('\u00a0', ' ').replace('\r\n', '\n')
          Path('/tmp/m9-footer-fix.patch').write_text(normalized, encoding='utf-8', newline='\n')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git am --3way /tmp/m9-footer-fix.patch; then
            git am --abort || true
            git apply --3way --recount --whitespace=nowarn /tmp/m9-footer-fix.patch
            git add knowledge_engine/cli.py tests/test_cli.py
            git commit -m "fix: render accurate M9 import-run summaries"
          fi

      - name: Remove transfer artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm m9-footer-fix.patch
          rm .github/workflows/apply-m9-footer-patch.yml
          git add -A
          git commit -m "chore: remove patch transfer artifacts"
          git push origin HEAD:fix/m9-import-run-footer
