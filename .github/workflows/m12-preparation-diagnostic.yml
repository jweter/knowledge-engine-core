name: M12 Preparation Diagnostic

on:
  pull_request:
    paths:
      - .github/workflows/m12-preparation-diagnostic.yml
      - .github/scripts/prepare_m12_pmc_corpus.py

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry and dependencies
        run: |
          python -m pip install poetry
          poetry install
      - name: Capture preparation diagnostics
        id: prepare
        continue-on-error: true
        run: |
          set -o pipefail
          poetry run python .github/scripts/prepare_m12_pmc_corpus.py \
            --workspace "$GITHUB_WORKSPACE" \
            --count 100 2>&1 | tee m12-preparation-error.txt
      - name: Upload preparation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m12-preparation-diagnostics
          path: m12-preparation-error.txt
          if-no-files-found: error
      - name: Fail after preparation diagnostics
        if: steps.prepare.outcome == 'failure'
        run: exit 1
